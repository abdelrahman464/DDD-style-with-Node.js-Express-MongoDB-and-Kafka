services:
  mongo:
    image: mongo:7
    container_name: task-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks: [task-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: task-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [task-net]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: task-kafka
    restart: unless-stopped
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [task-net]

  api:
    build: .
    container_name: task-api
    restart: unless-stopped
    depends_on: [mongo, kafka]
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/postsdb
      KAFKA_CLIENT_ID: task-service
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: post.created
      KAFKA_GROUP_ID: task-consumer-group
    command: ["node", "src/server.js"]
    networks: [task-net]

  consumer:
    build: .
    container_name: task-consumer
    restart: unless-stopped
    depends_on: [kafka]
    environment:
      KAFKA_CLIENT_ID: task-consumer
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: post.created
      KAFKA_GROUP_ID: task-consumer-group
    command: ["node", "src/consumer.js"]
    networks: [task-net]

volumes:
  mongo_data:

networks:
  task-net:
    driver: bridge
